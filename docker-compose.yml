services:
  postgres:
    image: postgres:16-alpine
    container_name: vj-garden-pos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vjgarden
      POSTGRES_PASSWORD: vjgarden_secret
      POSTGRES_DB: vj_garden_pos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vjgarden -d vj_garden_pos"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vj-garden-pos-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://vjgarden:vjgarden_secret@postgres:5432/vj_garden_pos?schema=public
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - api_logs:/app/logs

volumes:
  postgres_data:
  api_logs:
